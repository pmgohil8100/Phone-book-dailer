# Project-wide Gradle settings

# AndroidX support — REQUIRED for appcompat, material, constraintlayout
android.useAndroidX=true

# Automatically migrate support libraries to AndroidX
android.enableJetifier=true

# Gradle JVM memory
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Use parallel builds
org.gradle.parallel=true
